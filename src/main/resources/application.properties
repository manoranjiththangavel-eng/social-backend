spring.application.name=demo

# ✅ Database connection
spring.datasource.url=jdbc:mysql://mysql-container:3306/social_app
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update

# ✅ Disable SQL logging in production (exposes data)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ✅ REMOVED: Do not exclude security auto configuration
# spring.autoconfigure.exclude=... <-- this line is deleted

# ✅ JWT secret — change this to a strong random string
jwt.secret=V7rK9mP2xQ4wZ6nL8sY1uA3dF5hJ0cE

spring.security.user.password=disabled

# ✅ DB connection timeout
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=60000

# ✅ Only log warnings and errors in production
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# ✅ File upload size
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB


app.base-url=http://localhost:8080